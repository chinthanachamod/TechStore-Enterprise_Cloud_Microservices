server:
  port: 8082

spring:
  data:
    mongodb:
      # after GCP deployment, replace this IP address
      uri: mongodb://localhost:27017/techstore_products
      database: techstore_products

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
